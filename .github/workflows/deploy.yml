name: Deploy to S3

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Compile CV (LaTeX → PDF)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: seth_li_cv.tex
          working_directory: cv-source

      - name: Copy CV PDF to static folder
        run: cp cv-source/seth_li_cv.pdf static/cv/seth_li_cv.pdf

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Deploy to S3
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    us-east-1
        run: |
          aws s3 sync ./public s3://sethli-net-website \
            --delete \
            --cache-control "max-age=31536000,public" \
            --exclude "*.html" \
            --exclude "admin/*"
          aws s3 sync ./public s3://sethli-net-website \
            --delete \
            --cache-control "no-cache" \
            --exclude "*" \
            --include "*.html" \
            --include "admin/*"

      - name: Invalidate CloudFront
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    us-east-1
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.AWS_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
