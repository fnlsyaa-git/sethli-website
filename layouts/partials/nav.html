{{ $page := . }}
<nav class="site-nav">
  <div class="container">
    <div class="nav-inner">
      <a class="nav-brand" href="/">{{ site.Title }}</a>
      <input type="checkbox" id="nav-toggle" class="nav-toggle">
      <label for="nav-toggle" class="nav-hamburger" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </label>
      <ul class="nav-links">
        {{ range site.Menus.main }}
        {{ $active := false }}
        {{ if eq .URL "/" }}
          {{ $active = $page.IsHome }}
        {{ else }}
          {{ $active = hasPrefix $page.RelPermalink .URL }}
        {{ end }}
        <li>
          <a href="{{ .URL }}"{{ if $active }} class="active"{{ end }}>{{ .Name }}</a>
        </li>
        {{ end }}
      </ul>
    </div>
  </div>
</nav>
