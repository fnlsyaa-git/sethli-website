{{ define "main" }}
<div class="page-content">
  <div class="container">
    <div class="card" style="max-width:600px; margin:0 auto; text-align:center;">
      <span class="section-label">Contact</span>
      <h2 style="margin-bottom:12px;">Get in Touch</h2>
      <p style="color:var(--text-secondary); margin-bottom:24px;">For research collaboration, media inquiries, or student advising, reach out by email.</p>
      <a href="mailto:{{ site.Params.email }}" class="btn btn-primary btn-lg">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,12 2,6"/>
        </svg>
        {{ site.Params.email }}
      </a>
    </div>
  </div>
</div>
{{ end }}
